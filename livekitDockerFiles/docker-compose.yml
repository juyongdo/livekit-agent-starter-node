services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  livekit-server:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"   # HTTP API & WebSockets (Signaling)
      - "7881:7881/tcp" # WebRTC ICE over TCP
      - "7882:7882/udp" # WebRTC ICE over UDP
      - "3478:3478/udp" # TURN STUN Server
      - "50000-50100:50000-50100/udp" # Important: expose RTC port range
    depends_on:
      - redis

  livekit-egress:
    image: livekit/egress:latest
    volumes:
      - ./egress.yaml:/etc/egress.yaml
    # CRITICAL: Chrome sandboxing requires SYS_ADMIN privileges 
    cap_add:
      - SYS_ADMIN
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    depends_on:
      - livekit-server
      - redis

  livekit-agent:
    build:
      context: ./agent-starter-node
      dockerfile: Dockerfile
      target: development # <--- CRITICAL: Tells docker to use Stage 1
      # Tells Docker to inject every variable inside this file straight into the container
    env_file:
      - ./agent-starter-node/.env.development
      # - .env.production # <--- Enable in production
    # Hot reload mapping: Mirrors your local edits inside the container
    volumes:
      - ./agent-starter-node:/app
      - /app/node_modules # Protects container node_modules from local overrides
      - /app/.cache       # CRITICAL: Protects container cached models from local overrides
    # Overrides production CMD to run your dev auto-reloading environment
    command: pnpm run dev
    # environment: # <--- Enable in production
      # # Automatically pulls from your local terminal session's environment
      # - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      # - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
      - livekit-server
      